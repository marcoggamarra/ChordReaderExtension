<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>YouTube Music Analyzer</title>
		<style>
			body {
				margin: 0;
				padding: 12px;
				width: 340px;
				font-family: Arial, sans-serif;
				background: #ffffff;
				color: #111111;
			}

			h1 {
				margin: 0 0 8px;
				font-size: 16px;
			}

			#title {
				font-size: 13px;
				line-height: 1.4;
				word-break: break-word;
				margin-bottom: 8px;
			}

			#status {
				font-size: 12px;
				color: #444;
				margin-bottom: 10px;
			}

			.row {
				display: flex;
				justify-content: space-between;
				gap: 8px;
				font-size: 13px;
				margin-bottom: 6px;
			}

			.label {
				font-weight: bold;
			}

			#viz {
				width: 100%;
				height: 64px;
				border: 1px solid #ddd;
				border-radius: 6px;
				display: block;
				margin: 10px 0;
			}

			.controls {
				display: flex;
				gap: 8px;
			}

			button {
				flex: 1;
				padding: 8px;
				border: 1px solid #bbb;
				border-radius: 6px;
				background: #f5f5f5;
				cursor: pointer;
			}

			button:disabled {
				opacity: 0.6;
				cursor: not-allowed;
			}
		</style>
	</head>
	<body>
		<h1>YouTube Music Analyzer</h1>
		<div id="title">Loading video title...</div>
		<div id="status">Status: idle</div>
		<div class="row"><span class="label">Tempo:</span><span id="bpm">-</span></div>
		<div class="row"><span class="label">Chord:</span><span id="chord">-</span></div>
		<div class="row"><span class="label">Confidence:</span><span id="confidence">-</span></div>
		<div class="row"><span class="label">Energy:</span><span id="energy">-</span></div>
		<canvas id="viz" width="316" height="64"></canvas>
		<div class="controls">
			<button id="startButton">Start</button>
			<button id="stopButton" disabled>Stop</button>
		</div>
		<script src="popup.js"></script>
	</body>
</html>
